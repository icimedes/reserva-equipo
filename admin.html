<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ICIMEDES | Panel Administrativo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <a class="logo-box" href="https://icimedes.github.io/reserva-equipo/" target="_blank" aria-label="Ir al sitio publico">
          <img id="logoImg" class="logo" src="assets/img/logo.jpg" alt="" />
          <div id="logoFallback" class="logo-fallback">IC</div>
        </a>
        <div>
          <h1>ICIMEDES · Panel Administrativo</h1>
          <span class="sub">Aprobaciones de reservas</span>
        </div>
      </div>

      <div class="header-actions">
        <button id="btnLogout" class="btn secondary" type="button">Cerrar sesion</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="hero">
      <div>
        <span class="badge">Administracion</span>
        <h2>Reservas pendientes y aprobadas</h2>
        <p>Gestiona el estado de las solicitudes en tiempo real.</p>
      </div>
    </div>

    <section id="loginCard" class="card admin-login">
      <div class="hd">
        <h2 class="title">Acceso al panel</h2>
      </div>
      <div class="bd">
        <form id="loginForm" novalidate>
          <div class="form-grid">
            <div>
              <label for="adminToken">Token de acceso</label>
              <input id="adminToken" class="input" type="password" placeholder="Ingresa el token" />
              <p class="error-text" data-error-for="adminToken"></p>
            </div>
            <div class="full">
              <div id="loginStatus" class="notice hidden" aria-live="polite"></div>
            </div>
          </div>
          <div class="row">
            <button id="btnSendLink" class="btn" type="submit">Ingresar</button>
          </div>
        </form>
      </div>
    </section>

    <section id="adminPanel" class="card hidden">
      <div class="hd">
        <h2 class="title">Solicitudes</h2>
      </div>
      <div class="bd">
        <div class="legend" style="margin-bottom:12px;">
          <span><i style="background:#0f7b3a;"></i> Aprobada</span>
          <span><i style="background:#b88400;"></i> Pendiente</span>
          <span><i style="background:#b42318;"></i> Rechazada</span>
        </div>
        <div id="adminCards" class="admin-cards"></div>
      </div>
    </section>

    <section id="equiposPanel" class="card hidden" style="margin-top:18px;">
      <div class="hd">
        <h2 class="title">Equipos</h2>
      </div>
      <div class="bd">
        <form id="equipoForm" novalidate>
          <div class="form-grid" style="grid-template-columns:1fr;">
            <div>
              <label for="equipoNombre">Nombre del equipo</label>
              <input id="equipoNombre" class="input" type="text" placeholder="Ej. Camilla A" />
              <p class="error-text" data-error-for="equipoNombre"></p>
            </div>
          </div>
          <div class="row">
            <button id="btnGuardarEquipo" class="btn" type="submit">Guardar equipo</button>
            <button id="btnCancelarEquipo" class="btn secondary hidden" type="button">Cancelar</button>
            <span id="equipoStatus" class="notice hidden" aria-live="polite"></span>
          </div>
        </form>

        <hr style="margin:18px 0;border:none;border-top:1px solid var(--line);" />

        <div class="legend" style="margin-bottom:12px;">
          <span><i style="background:#0f7b3a;"></i> Activo</span>
          <span><i style="background:#999;"></i> Inactivo</span>
        </div>
        <div id="equiposCards" class="admin-cards"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
